<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Neardis — Hyperlocal Deals</title>
  <link rel="stylesheet" href="main.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Bebas+Neue&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <!-- Desktop Sidebar -->
    <nav class="sidebar">
      <div class="logo" onclick="navigate('feed')">N</div>
      <div class="nav-item active" data-page="feed">🏷<span class="ni-label">Feed</span></div>
      <div class="nav-item" data-page="map">🗺<span class="ni-label">Map</span></div>
      <div class="nav-item" data-page="flash">⚡<span class="ni-label">Flash</span></div>
      <div class="nav-sep"></div>
      <div class="nav-item" data-page="bookmarks">🔖<span class="ni-label">Saved</span></div>
      <div class="nav-item" data-page="notifications">🔔<span class="ni-label">Alerts</span></div>
      <div class="nav-sep"></div>
      <div class="nav-item" data-page="business">📊<span class="ni-label">Biz</span></div>
      <div class="nav-item" data-page="settings">⚙️<span class="ni-label">Settings</span></div>
    </nav>

    <div class="main">
      <!-- Flash Ticker -->
      <div class="flash-ticker" id="flash-ticker-bar">
        <div class="ticker-label">⚡ FLASH</div>
        <div class="ticker-wrap"><div class="ticker-inner" id="ticker">Loading...</div></div>
      </div>

      <!-- Content Injection Point -->
      <div id="page-content"></div>
    </div>
  </div>

  <!-- Mobile Nav -->
  <nav class="bottom-nav">
    <div class="bnav-item active" data-page="feed">🏷</div>
    <div class="bnav-item" data-page="map">🗺</div>
    <div class="bnav-item" data-page="flash">⚡</div>
    <div class="bnav-item" data-page="bookmarks">🔖</div>
    <div class="bnav-item" data-page="settings">⚙️</div>
  </nav>

  <!-- Global Modal -->
  <div id="deal-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-head">
        <div class="modal-head-title">Deal Details</div>
        <button onclick="closeDeal()">✕ Close</button>
      </div>
      <div class="modal-body">
        <div class="modal-main" id="modal-main"></div>
        <div class="modal-side" id="modal-side"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
